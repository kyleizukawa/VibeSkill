    <script>
        // xAI Grok Integration
        const GROK_API_KEY = "YOUR_XAI_API_KEY";

        async function generateGrokSkill(prompt) {
            // Updated Official March 2026 Model List
            const models = ["grok-4", "grok-4.20", "grok-4.1", "grok-latest", "grok-beta"];

            for (const modelName of models) {
                try {
                    console.log(`📡 Attempting generation with: ${modelName}`);
                    const response = await fetch("https://api.x.ai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${GROK_API_KEY}`
                        },
                        body: JSON.stringify({
                            model: modelName,
                            messages: [{
                                role: "user",
                                content: `Create a professional 'Skill' in markdown for: ${prompt}. Include YAML header and clear workflow steps.`
                            }],
                            stream: false
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        return data.choices?.[0]?.message?.content || null;
                    }

                    // Detailed Log for Debugging
                    console.error(`❌ Model ${modelName} rejected:`, data);

                    // If it's specifically a model access/name error, try the next one
                    const errMsg = (data.error?.message || "").toLowerCase();
                    if (errMsg.includes("model not found") || errMsg.includes("invalid model")) {
                        continue;
                    }

                    // For billing/auth errors, stop and alert user
                    alert(`Grok API Error (${response.status}): ${data.error?.message || "Unknown error"}`);
                    return null;

                } catch (err) {
                    console.error("Critical Connection Error/Security block:", err);
                    if (window.location.protocol === 'file:') {
                        alert("SECURITY BLOCK: Browser blocked API call from file:// link. Please run through a local server (localhost).");
                        return null;
                    }
                    break;
                }
            }
            alert("None of the models worked. This is usually due to account permissions or an inactive API key.");
            return null;
        }
    </script>

    <script>
        // --- Dashboard State & Elements ---
        let currentUser = null;
        const renderView = document.getElementById('render-view');
        const editorView = document.getElementById('editor-view');
        const dashInput = document.getElementById('dash-input');
        const sendBtn = document.getElementById('send-trigger');
        const chatStar = document.querySelector('.chat-star');

        // --- Auth & Init ---
        async function initAuth() {
            currentUser = await getUser();
            if (!currentUser) { window.location.href = "auth.html"; return; }
            document.querySelector('.u-name').innerText = currentUser.user_metadata.display_name || currentUser.email.split('@')[0];
            loadUserSkills();
        }

        async function loadUserSkills() {
            const { data } = await getSkills();
            if (data) console.log("User skills:", data);
        }

        async function handleSignOut() {
            await signOut();
            window.location.href = "index.html";
        }

        // --- AI Interaction (Grok) ---
        async function handleInteraction() {
            const prompt = dashInput.value.trim();
            if (!prompt) return;

            // Update UI to Loading State
            dashInput.value = "";
            dashInput.placeholder = "Grok is analyzing...";
            sendBtn.innerHTML = "...";
            renderView.innerHTML = '<div style="padding: 40px; text-align:center; color:rgba(255,255,255,0.4); font-style:italic;">Drafting your skill... ✨</div>';

            const generatedMD = await generateGrokSkill(prompt);

            if (generatedMD) {
                // Populate Editor and Preview
                editorView.value = generatedMD;
                renderView.innerHTML = marked.parse(generatedMD);

                // Polish the new elements
                styleRenderedContent();

                // Auto-save the first generation
                saveSkill(prompt.substring(0, 20) + "...", generatedMD);
            } else {
                renderView.innerHTML = '<div style="color: #f87171; padding:20px;">Failed to reach Grok. Verify your API key.</div>';
            }

            // Reset UI
            dashInput.placeholder = "Refine your skill... e.g. 'Add a section for visual style'";
            sendBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
        }

        function styleRenderedContent() {
            // Apply theme-appropriate styling to markdown output
            renderView.querySelectorAll('pre').forEach(pre => {
                pre.style.background = "rgba(0,0,0,0.3)";
                pre.style.padding = "20px";
                pre.style.borderRadius = "16px";
                pre.style.border = "1px solid rgba(255,255,255,0.05)";
                pre.style.margin = "20px 0";
            });
            renderView.querySelectorAll('h2, h3').forEach(h => {
                h.style.marginTop = "30px";
                h.style.color = "#fff";
            });
            renderView.querySelectorAll('li').forEach(li => {
                li.style.marginBottom = "8px";
                li.style.opacity = "0.9";
            });
        }

        // --- Event Listeners ---
        if (sendBtn) sendBtn.addEventListener('click', handleInteraction);
        if (dashInput) {
            dashInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleInteraction(); });
            dashInput.addEventListener('focus', () => {
                chatStar.style.animation = 'starQuickAction 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                setTimeout(() => { if (chatStar) chatStar.style.animation = ''; }, 600);
            });
        }

        // Sidebar Back to Home (acting as Logout/Back)
        const backHome = document.querySelector('.side-item[style*="text-decoration:none"]');
        if (backHome) backHome.addEventListener('click', (e) => { e.preventDefault(); handleSignOut(); });

        initAuth();
    </script>
